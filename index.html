    <style>

            border-top: 6px solid #673AB7; box-sizing: border-box;

        .header-container img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #D1C4E9; background: #fff; object-fit: contain; }
        h1 { color: #fff; font-size: 36px; margin: 0; text-shadow: 2px 2px 4px #000; letter-spacing: 4px; }

        input[type="date"]::-webkit-calendar-picker-indicator, input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .boards-container { display: flex; gap: 20px; flex-wrap: wrap; width: 100%; }

        .board-title { color: #fff; font-size: 28px; text-align: center; border-bottom: 2px solid #D1C4E9; padding-bottom: 10px; margin: 0 0 10px 0; font-weight: bold; }

        .lineup-row {
            display: flex; align-items: center; gap: 10px; 
            background: rgba(255, 255, 255, 0.75); 
            padding: 8px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2);
        }
        
        /* 🌟 預備球員列縮小緊貼，保留原留白設置 🌟 */
        .reserve-row { width: max-content; padding-right: 15px; }
        .reserve-row .player-select { flex: none; width: 160px; }

        .order-label { background: #673AB7; color: #fff; font-size: 24px; font-weight: bold; padding: 5px 0; border-radius: 5px; width: 65px; text-align: center; flex-shrink: 0; }
        .reserve-label { background: #555; font-size: 22px; }
        
        .jersey-badge { background: #4A148C; color: #fff; font-size: 22px; font-weight: bold; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 0; flex-shrink: 0; }
        .jersey-badge.active { opacity: 1; }

        select { font-size: 24px; padding: 6px; border-radius: 5px; border: 1px solid #666; cursor: pointer; color: #000; background: #fff; font-weight: bold; }
        select option { color: #000; background: #fff; }
        .player-select { flex: 1; min-width: 140px; }
        .pos-select { width: 120px; flex-shrink: 0; text-align: center; }

        /* 按鈕區塊移入圖框內，調整樣式 */
        .btn-group { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            margin-top: 35px; width: 100%; 
        }
        button { 
            font-size: 20px; padding: 12px 25px; 
            font-weight: bold; color: #fff; border: none; border-radius: 8px;

        }
        #export-btn { background: #444; }
        #share-line-btn { background: #06C755; display: flex; align-items: center; gap: 8px; }
        #share-line-btn img { width: 28px; height: 28px; }
    </style>
</head>

    function validateForm() {
        // 球員重複檢查
        const pSelects = Array.from(document.querySelectorAll('.player-select'));
        const pValues = pSelects.map(s => s.value).filter(v => v !== "");
        pSelects.forEach(select => {
            if (select.value === "") {
                select.style.color = "#000";
            } else {
                const count = pValues.filter(v => v === select.value).length;
                select.style.color = count > 1 ? "#FF3B30" : "#000"; 
            }
        });

        // 守位重複檢查

            }
        });
    }
