<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒球攻守名單 - 智能防呆版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: '微軟正黑體', sans-serif; background: #222; margin: 0; padding: 20px 5px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #capture-area {
            width: 100%; max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; border-radius: 12px;
            background-color: #2e1a47; 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            padding-bottom: 30px; /* 稍微縮小底部留白 */
            border-top: 6px solid #673AB7; box-sizing: border-box;
        }

        .header-container { display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .header-container img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #D1C4E9; background: #fff; object-fit: contain; }
        h1 { color: #fff; font-size: 36px; margin: 0; text-shadow: 2px 2px 4px #000; letter-spacing: 4px; }

        .info-bar { display: flex; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .info-item { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 250px; border-bottom: 1px solid #D1C4E9; padding-bottom: 5px; }
        .info-item label { color: #fff; font-size: 22px; font-weight: bold; white-space: nowrap; }
        .info-item input, .info-item select { font-size: 24px; padding: 5px; border-radius: 5px; border: none; background: transparent; color: #fff; font-weight: bold; flex: 1; outline: none; cursor: pointer; }
        .info-item select option { color: #000; background: #fff; }
        input[type="date"]::-webkit-calendar-picker-indicator, input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .boards-container { display: flex; gap: 20px; flex-wrap: wrap; width: 100%; }
        .board-column { flex: 1; min-width: 320px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .board-title { color: #fff; font-size: 28px; text-align: center; border-bottom: 2px solid #D1C4E9; padding-bottom: 10px; margin: 0 0 10px 0; font-weight: bold; }

        .lineup-row {
            display: flex; align-items: center; gap: 10px; 
            background: rgba(255, 255, 255, 0.75); 
            padding: 8px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2);
        }
        
        /* 🌟 預備球員列縮小緊貼 🌟 */
        .reserve-row { width: max-content; padding-right: 15px; }
        .reserve-row .player-select { flex: none; width: 160px; }

        .order-label { background: #673AB7; color: #fff; font-size: 24px; font-weight: bold; padding: 5px 0; border-radius: 5px; width: 65px; text-align: center; flex-shrink: 0; }
        .reserve-label { background: #555; font-size: 22px; }
        
        .jersey-badge { background: #4A148C; color: #fff; font-size: 22px; font-weight: bold; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 0; flex-shrink: 0; }
        .jersey-badge.active { opacity: 1; }

        select { font-size: 24px; padding: 6px; border-radius: 5px; border: 1px solid #666; cursor: pointer; color: #000; background: #fff; font-weight: bold; }
        select option { color: #000; background: #fff; }
        .player-select { flex: 1; min-width: 140px; }
        .pos-select { width: 120px; flex-shrink: 0; text-align: center; }

        /* 🌟 按鈕區塊移入圖框內，調整樣式 🌟 */
        .btn-group { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            margin-top: 35px; width: 100%; 
        }
        button { 
            font-size: 20px; padding: 12px 25px; 
            font-weight: bold; color: #fff; border: none; border-radius: 8px; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        #export-btn { background: #444; }
        #share-line-btn { background: #06C755; display: flex; align-items: center; gap: 8px; }
        #share-line-btn img { width: 28px; height: 28px; }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="header-container">
        <img id="team-logo-display" src="" alt="LOGO" crossorigin="anonymous">
        <h1>🔥 攻 守 名 單 🔥</h1>
    </div>
    
    <div class="info-bar">
        <div class="info-item"><label>日期：</label><input type="date" id="game-date"></div>
        <div class="info-item"><label>集合：</label><input type="time" value="08:00"></div>
        <div class="info-item"><label>比賽：</label><input type="time" value="09:00"></div>
        <div class="info-item">
            <label>地點：</label>
            <select id="game-location"><option value="">-- 同步中 --</option></select>
        </div>
        <div class="info-item">
            <label>休息區：</label>
            <select>
                <option value="">-- 選擇 --</option>
                <option value="一壘側">一壘側</option>
                <option value="三壘側">三壘側</option>
            </select>
        </div>
        <div class="info-item"><label>對戰：</label><input type="text" placeholder="對手名稱"></div>
    </div>
    
    <div class="boards-container">
        <div class="board-column">
            <h2 class="board-title">⚾ 先發名單</h2>
            <div id="starters-board"></div>
        </div>
        <div class="board-column">
            <h2 class="board-title" style="color:#ddd">🛡️ 預備球員</h2>
            <div id="reserves-board"></div>
        </div>
    </div>

    <div class="btn-group">
        <button id="export-btn">📸 下載圖片</button>
        <button id="share-line-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE"> 🟢 截圖分享</button>
    </div>
</div>

<script>
    const part1 = "https://lh3.google";
    const part2 = "usercontent.com/d/";
    const imgBase = part1 + part2;
    const bgID = "1vNdTLpYSVeh6FwwGmErapoPO_NEDIg56"; 
    const logoID = "1aooCsOuMMtwMhT5bay4kDQCAq9sbm3kW"; 
    
    document.getElementById('capture-area').style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), url('${imgBase}${bgID}')`;
    document.getElementById('team-logo-display').src = `${imgBase}${logoID}`;
    document.getElementById('game-date').value = new Date().toISOString().split('T')[0];

    const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE8qU7MUo8mltMrnQSLttK1ePGuN2ooTaD3QBtoKsmvrW5tEKOjSXwGm9bwhZtgy2veLF-QLTpe33q/pub?output=csv";
    let playersData = [], locations = [];
    
    // 🌟 已移除 P(1) 選項 🌟
    const posList = ["C(2)", "1B(3)", "2B(4)", "3B(5)", "SS(6)", "LF(7)", "CF(8)", "RF(9)", "DH"];

    const startersBoard = document.getElementById('starters-board');
    const reservesBoard = document.getElementById('reserves-board');

    // 🌟 核心防呆驗證邏輯：重複亮紅字 🌟
    function validateForm() {
        // 球員重複檢查
        const pSelects = Array.from(document.querySelectorAll('.player-select'));
        const pValues = pSelects.map(s => s.value).filter(v => v !== "");
        pSelects.forEach(select => {
            if (select.value === "") {
                select.style.color = "#000";
            } else {
                const count = pValues.filter(v => v === select.value).length;
                select.style.color = count > 1 ? "#FF3B30" : "#000"; // 重複就變紅
            }
        });

        // 守位重複檢查
        const posSelects = Array.from(document.querySelectorAll('.pos-select'));
        const posValues = posSelects.map(s => s.value).filter(v => v !== "" && v !== "P(1)");
        posSelects.forEach(select => {
            if (select.value === "" || select.value === "P(1)") { // P(1) 獨立計算
                select.style.color = "#000";
            } else {
                const count = posValues.filter(v => v === select.value).length;
                select.style.color = count > 1 ? "#FF3B30" : "#000"; // 重複就變紅
            }
        });
    }

    function createRow(labelText, type, container) {
        const row = document.createElement('div');
        // 🌟 區分先發與預備，套用不同寬度 🌟
        row.className = type === 'reserve' ? 'lineup-row reserve-row' : 'lineup-row starter-row';
        const labelClass = type === 'reserve' ? 'order-label reserve-label' : 'order-label';

        row.innerHTML = `
            <div class="${labelClass}">${labelText}</div>
            <div class="jersey-badge"></div>
            <select class="player-select"><option value="">-- 球員 --</option></select>
            <select class="pos-select"><option value="">-- 守位 --</option></select>
        `;

        const pSelect = row.querySelector('.player-select');
        const badge = row.querySelector('.jersey-badge');
        const posSelect = row.querySelector('.pos-select');

        if (type === 'pitcher') {
            posSelect.innerHTML = '<option value="P(1)">P(1)</option>';
            posSelect.disabled = true;
        } else if (type === 'reserve') {
            posSelect.style.display = 'none'; // 預備球員徹底隱藏守位選單
        }

        // 每次選擇都觸發防呆檢查
        pSelect.addEventListener('change', () => {
            const p = playersData.find(x => x.name === pSelect.value);
            if (p && p.num) {
                badge.textContent = p.num;
                badge.classList.add('active');
            } else {
                badge.textContent = '';
                badge.classList.remove('active');
            }
            validateForm(); // 觸發紅字檢查
        });

        if (type !== 'reserve') {
            posSelect.addEventListener('change', validateForm); // 觸發紅字檢查
        }

        container.appendChild(row);
    }

    for (let i = 1; i <= 9; i++) createRow(i + ' 棒', 'starter', startersBoard);
    createRow('P', 'pitcher', startersBoard);
    for (let i = 1; i <= 8; i++) createRow('預', 'reserve', reservesBoard);

    Papa.parse(GOOGLE_SHEET_URL, {
        download: true,
        header: false,
        complete: function(results) {
            const data = results.data.slice(1);
            playersData = data.map(row => ({ num: String(row[0]||"").trim(), name: String(row[1]||"").trim() })).filter(p => p.name !== "");
            locations = Array.from(new Set(data.map(row => String(row[2]||"").trim()))).filter(loc => loc !== "");

            const locSelect = document.getElementById('game-location');
            locSelect.innerHTML = '<option value="">-- 選擇球場 --</option>' + locations.map(loc => `<option value="${loc}">${loc}</option>`).join('');

            document.querySelectorAll('.player-select').forEach(select => {
                playersData.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.name; opt.textContent = p.name;
                    select.appendChild(opt);
                });
            });

            document.querySelectorAll('.pos-select').forEach(select => {
                if (select.disabled || select.style.display === 'none') return;
                posList.forEach(pos => {
                    const opt = document.createElement('option');
                    opt.value = pos; opt.textContent = pos;
                    select.appendChild(opt);
                });
            });
        }
    });

    async function handleShare() {
        const btnGroup = document.querySelector('.btn-group');
        // 🌟 截圖前：把按鈕隱藏，這樣就不會入鏡 🌟
        btnGroup.style.display = 'none'; 
        
        const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 2, useCORS: true });
        
        // 🌟 截圖後：把按鈕顯示回來 🌟
        btnGroup.style.display = 'flex'; 

        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'lineup.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) navigator.share({ files: [file] });
            else { const link = document.createElement('a'); link.download = 'lineup.png'; link.href = URL.createObjectURL(blob); link.click(); }
        });
    }

    document.getElementById('export-btn').onclick = handleShare;
    document.getElementById('share-line-btn').onclick = handleShare;
</script>
</body>
</html>
