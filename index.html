<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒球攻守名單 - 專業代碼版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { 
            --primary-color: #673AB7; --accent-color: #E040FB; --secondary-color: #222222; 
            --bg-color: #f4f4f9; --error-color: #e74c3c; --line-color: #06C755; 
            --reserve-color: #9e9e9e; --info-bg: rgba(243, 229, 245, 0.95); --info-border: #d1c4e9;
            --target-font-size: 30px;
        }
        body { font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background: var(--bg-color); margin: 0; padding: 5px; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; }
        
        #capture-area { 
            width: 100%; max-width: 1000px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.5); 
            border-top: 6px solid var(--primary-color); box-sizing: border-box; position: relative;
            background-color: #111;
            background-image: url('https://lh3.googleusercontent.com/d/1GDCzxfienpG_wIKKEcRLIdwmBmtt0wS-'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            margin-bottom: 20px;
        }
        
        .header-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; padding: 8px 0; background: rgba(255, 255, 255, 0.88); border-radius: 8px; }
        #team-logo-display { width: 85px; height: 85px; border-radius: 50%; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 3px solid var(--primary-color); }
        #team-logo-display img { max-width: 100%; max-height: 100%; object-fit: contain; }
        h1 { text-align: center; color: var(--secondary-color); margin: 0; font-size: 48px; font-weight: 900; letter-spacing: 4px; text-shadow: 1px 1px 2px rgba(255,255,255,0.9); }
        
        .game-info-container { background: var(--info-bg); border: 2px solid var(--info-border); border-radius: 6px; padding: 10px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .info-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .info-item { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 150px; }
        .info-item label { font-size: 22px; font-weight: bold; color: var(--secondary-color); }
        .info-item input, .info-item select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: var(--target-font-size); outline: none; background: #fff; font-weight: bold; color: #000; }
        
        .boards-wrapper { display: flex; gap: 15px; align-items: flex-start; width: 100%; justify-content: center; }
        .column { flex: 0 1 auto; display: flex; flex-direction: column; gap: 5px; min-width: 320px; }

        .section-title { text-align: center; color: #fff; margin: 0 0 5px 0; border-bottom: 3px solid var(--accent-color); padding-bottom: 5px; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        .lineup-row { display: flex; gap: 6px; align-items: center; padding: 5px; background: rgba(255, 255, 255, 0.98); border: 1px solid #ddd; border-radius: 6px; min-height: 65px; width: fit-content; min-width: 100%; box-sizing: border-box; }
        
        .player-group { flex: 0 1 auto; display: flex; align-items: center; gap: 6px; }
        .player-select { width: auto; flex: 0 1 auto; min-width: 180px; }

        /* 🌟 加寬守位選單以容納數字代碼 🌟 */
        .pos-select { width: 140px; flex-shrink: 0; text-align: center; }

        .order-label { font-weight: bold; font-size: 32px; width: 65px; text-align: center; color: var(--secondary-color); background: #eee; padding: 8px 0; border-radius: 4px; flex-shrink: 0; }
        .pitcher-label { background: var(--primary-color); color: white; }
        .reserve-label { background: var(--reserve-color); color: white; font-size: 26px; }
        
        .jersey-badge { width: 48px; height: 48px; background: var(--accent-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0; flex-shrink: 0; font-size: 28px; transition: opacity 0.3s; }
        .jersey-badge.active { opacity: 1; }
        
        select { padding: 8px 5px; border: 1px solid #ccc; border-radius: 4px; font-size: var(--target-font-size); outline: none; background: #fff; font-weight: bold; cursor: pointer; color: #000; min-height: 55px; }
        
        .status-message { margin-top: 10px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 28px; }
        .status-success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .status-warning { background: #fff3cd; color: #856404; border: 2px solid #ffeeba; }
        
        .button-group { margin: 20px 0 40px 0; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; max-width: 1000px; }
        button { padding: 20px 45px; font-size: 34px; font-weight: bold; color: #fff; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        #export-btn { background: var(--secondary-color); }
        #share-line-btn { background: var(--line-color); display: flex; align-items: center; justify-content: center; gap: 12px; }
        #share-line-btn img { width: 38px; height: 38px; }
        
        @media (max-width: 800px) { 
            .boards-wrapper { flex-direction: column; align-items: center; gap: 15px; } 
            .column { width: 100%; max-width: 500px; }
            .lineup-row { width: 100%; }
            .player-select { flex: 1; }
        }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="header-container">
        <div id="team-logo-display">
            <img src="https://lh3.googleusercontent.com/d/1aooCsOuMMtwMhT5bay4kDQCAq9sbm3kW" alt="LOGO" crossorigin="anonymous">
        </div>
        <h1>🔥 攻 守 名 單 🔥</h1>
    </div>
    
    <div class="game-info-container">
        <div class="info-row">
            <div class="info-item"><label>📅 比賽日期</label><input type="date" id="game-date"></div>
            <div class="info-item"><label>⏰ 集合時間</label><input type="time" id="meet-time" value="08:00"></div>
            <div class="info-item"><label>⚾ 比賽時間</label><input type="time" id="game-time" value="09:00"></div>
        </div>
        <div class="info-row">
            <div class="info-item">
                <label>🏟️ 比賽地點</label>
                <select id="game-location"><option value="">-- 同步中 --</option></select>
            </div>
            <div class="info-item">
                <label>🚩 休息區</label>
                <select id="bench-side">
                    <option value="">-- 二選一 --</option>
                    <option value="一壘側">一壘側</option>
                    <option value="三壘側">三壘側</option>
                </select>
            </div>
            <div class="info-item"><label>🆚 對戰球隊</label><input type="text" id="opponent-team" placeholder="輸入對手"></div>
        </div>
    </div>
    
    <div class="boards-wrapper">
        <div class="column">
            <div class="section-title">⚾ 先發名單</div>
            <div id="starters-board" class="column"></div>
        </div>
        <div class="column">
            <div class="section-title" style="color:#ddd">🛡️ 預備球員</div>
            <div id="reserves-board" class="column"></div>
        </div>
    </div>
    <div id="status-box" class="status-message"></div>
</div>

<div class="button-group" id="action-buttons" style="display: none;">
    <button id="export-btn">📸 下載圖片</button>
    <button id="share-line-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE"> 🟢 截圖分享</button>
</div>
