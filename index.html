<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒球攻守名單 - 排版修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { 
            --primary-color: #673AB7; --accent-color: #E040FB; --secondary-color: #222222; 
            --bg-color: #f4f4f9; --light-purple: #D1C4E9; 
            --target-font-size: 30px;
        }
        body { font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background: var(--bg-color); margin: 0; padding: 5px; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; }
        
        #capture-area { 
            width: 100%; max-width: 1000px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.5); 
            border-top: 6px solid var(--primary-color); box-sizing: border-box; position: relative;
            background-color: #111;
            background-image: url('https://drive.google.com/thumbnail?id=1lXlO9vWbB8N-M-uS94lU31b6M7Vn1V1Z&sz=w1200'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            margin-bottom: 20px;
        }
        
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; padding: 10px 0; background: rgba(0, 0, 0, 0.3); border-radius: 8px; backdrop-filter: blur(5px); }
        #team-logo-display { width: 90px; height: 90px; border-radius: 50%; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 4px solid var(--light-purple); flex-shrink: 0; }
        #team-logo-display img { width: 100%; height: 100%; object-fit: contain; }
        h1 { text-align: center; color: #fff; margin: 0; font-size: 48px; font-weight: 900; letter-spacing: 4px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        .game-info-container { background: transparent; border: none; padding: 5px 0; margin-bottom: 15px; display: flex; flex-direction: column; }
        .info-row { display: flex; gap: 20px; flex-wrap: wrap; }
        
        /* 🌟 優化項目間距，防止重疊 🌟 */
        .info-item { 
            flex: 1; display: flex; align-items: center; gap: 5px; min-width: 300px; 
            padding: 10px 0; border-bottom: 1.5px solid var(--light-purple); 
        }
        .info-item label { 
            font-size: 24px; font-weight: bold; color: #fff; white-space: nowrap; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        /* 🌟 針對 Date/Time Input 的專屬修正 🌟 */
        .info-item input, .info-item select { 
            flex: 1; background: transparent; border: none; color: #fff; 
            font-size: var(--target-font-size); font-weight: bold; outline: none; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            padding-right: 10px;
            text-align: left;
        }

        /* 🌟 強制將瀏覽器原生圖示推往右邊，避免擋到字 🌟 */
        input[type="date"]::-webkit-calendar-picker-indicator, 
        input[type="time"]::-webkit-calendar-picker-indicator { 
            filter: invert(1); 
            cursor: pointer;
            margin-left: 10px;
            padding: 5px;
        }

        /* 修正 iOS 預設樣式 */
        input[type="date"], input[type="time"] {
            -webkit-appearance: none;
            min-height: 45px;
        }

        .boards-wrapper { display: flex; gap: 15px; align-items: flex-start; width: 100%; justify-content: center; }
        .column { flex: 0 1 auto; display: flex; flex-direction: column; gap: 5px; min-width: 320px; }
        .section-title { text-align: center; color: #fff; margin: 0 0 5px 0; border-bottom: 3px solid var(--light-purple); padding-bottom: 5px; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        .lineup-row { display: flex; gap: 6px; align-items: center; padding: 5px; background: rgba(255, 255, 255, 0.95); border: 1px solid #ddd; border-radius: 6px; min-height: 65px; width: fit-content; min-width: 100%; box-sizing: border-box; }
        .player-group { flex: 0 1 auto; display: flex; align-items: center; gap: 6px; }
        .player-select { width: auto; flex: 0 1 auto; min-width: 180px; }
        .pos-select { width: 140px; flex-shrink: 0; text-align: center; }

        .order-label { font-weight: bold; font-size: 32px; width: 65px; text-align: center; color: var(--secondary-color); background: #eee; padding: 8px 0; border-radius: 4px; flex-shrink: 0; }
        .pitcher-label { background: var(--primary-color); color: white; }
        .reserve-label { background: #9e9e9e; color: white; font-size: 26px; }
        
        .jersey-badge { width: 48px; height: 48px; background: var(--accent-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0; flex-shrink: 0; font-size: 28px; transition: opacity 0.3s; }
        .jersey-badge.active { opacity: 1; }
        
        select { padding: 8px 5px; border: 1px solid #ccc; border-radius: 4px; font-size: var(--target-font-size); outline: none; background: #fff; font-weight: bold; cursor: pointer; color: #000; min-height: 55px; }
        
        .status-message { margin-top: 10px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 28px; }
        .status-success { background: rgba(212, 237, 218, 0.9); color: #155724; border: 2px solid #c3e6cb; }
        .status-warning { background: rgba(255, 243, 205, 0.9); color: #856404; border: 2px solid #ffeeba; }
        
        .button-group { margin: 20px 0 40px 0; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; max-width: 1000px; }
        button { padding: 20px 45px; font-size: 34px; font-weight: bold; color: #fff; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.1s; }
        #export-btn { background: var(--secondary-color); }
        #share-line-btn { background: var(--line-color); display: flex; align-items: center; justify-content: center; gap: 12px; }
        #share-line-btn img { width: 38px; height: 38px; }
        
        @media (max-width: 800px) { .boards-wrapper { flex-direction: column; align-items: center; gap: 15px; } .info-item { min-width: 100%; } }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="header-container">
        <div id="team-logo-display">
            <img src="https://drive.google.com/thumbnail?id=1aooCsOuMMtwMhT5bay4kDQCAq9sbm3kW&sz=w200" alt="LOGO" crossorigin="anonymous">
        </div>
        <h1>🔥 攻 守 名 單 🔥</h1>
    </div>
    
    <div class="game-info-container">
        <div class="info-row">
            <div class="info-item"><label>日期：</label><input type="date" id="game-date"></div>
            <div class="info-item"><label>集合：</label><input type="time" id="meet-time" value="08:00"></div>
            <div class="info-item"><label>比賽：</label><input type="time" id="game-time" value="09:00"></div>
        </div>
        <div class="info-row">
            <div class="info-item">
                <label>地點：</label>
                <select id="game-location"><option value="">-- 選擇球場 --</option></select>
            </div>
            <div class="info-item">
                <label>休息區：</label>
                <select id="bench-side">
                    <option value="">-- 選擇 --</option>
                    <option value="一壘側">一壘側</option>
                    <option value="三壘側">三壘側</option>
                </select>
            </div>
            <div class="info-item"><label>對戰：</label><input type="text" id="opponent-team" placeholder="輸入對手"></div>
        </div>
    </div>
    
    <div class="boards-wrapper">
        <div class="column">
            <div class="section-title">⚾ 先發名單</div>
            <div id="starters-board" class="column"></div>
        </div>
        <div class="column">
            <div class="section-title" style="color:#ddd">🛡️ 預備球員</div>
            <div id="reserves-board" class="column"></div>
        </div>
    </div>
    <div id="status-box" class="status-message"></div>
</div>

<div class="button-group" id="action-buttons" style="display: none;">
    <button id="export-btn">📸 下載圖片</button>
    <button id="share-line-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE"> 🟢 截圖分享</button>
</div>

<script>
    const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE8qU7MUo8mltMrnQSLttK1ePGuN2ooTaD3QBtoKsmvrW5tEKOjSXwGm9bwhZtgy2veLF-QLTpe33q/pub?output=csv";
    let playersData = [], locations = [];
    const posList = ["P(1)", "C(2)", "1B(3)", "2B(4)", "3B(5)", "SS(6)", "LF(7)", "CF(8)", "RF(9)", "DH"];

    async function fetchRoster() {
        Papa.parse(GOOGLE_SHEET_URL, { download: true, header: false, complete: function(results) {
            const data = results.data.slice(1);
            playersData = data.map(row => ({ num: String(row[0]||""), name: String(row[1]||"") })).filter(p => p.name !== "");
            locations = Array.from(new Set(data.map(row => String(row[2]||"").trim()))).filter(loc => loc !== "");
            initializePlayerDropdowns();
            refreshLocationDropdown();
            validate();
        }});
    }

    function refreshLocationDropdown() {
        document.getElementById('game-location').innerHTML = '<option value="" style="color:#000">-- 選擇球場 --</option>' + locations.map(loc => `<option value="${loc}" style="color:#000">${loc}</option>`).join('');
    }

    function initializePlayerDropdowns() {
        const allPlayerSelects = document.querySelectorAll('.player-select');
        let options = `<option value="">-- 球員 --</option>`;
        playersData.forEach(p => { options += `<option value="${p.name}">${p.name}</option>`; });
        allPlayerSelects.forEach(select => {
            const currentVal = select.value;
            select.innerHTML = options;
            if (currentVal) select.value = currentVal;
        });
    }

    function updatePosDropdowns() {
        const allPosSelects = document.querySelectorAll('.pos-select');
        const selectedPositions = Array.from(allPosSelects).map(s => s.value).filter(v => v !== "" && v !== "P(1)" && v !== "Bench");
        allPosSelects.forEach(select => {
            if (select.classList.contains('pitcher') || select.classList.contains('reserve')) return;
            const currentVal = select.value;
            let options = `<option value="">-- 守位 --</option>`;
            posList.filter(p => p !== 'P(1)').forEach(pos => {
                if (pos === currentVal || !selectedPositions.includes(pos)) {
                    options += `<option value="${pos}" ${pos === currentVal ? 'selected' : ''}>${pos}</option>`;
                }
            });
            select.innerHTML = options;
        });
        validate();
    }

    function createRow(labelText, type, container) {
        const row = document.createElement('div'); 
        row.className = 'lineup-row ' + (type === 'reserve' ? 'reserve-row' : 'starter-row');
        row.innerHTML = `<div class="order-label ${type === 'pitcher' ? 'pitcher-label' : (type === 'reserve' ? 'reserve-label' : '')}">${labelText}</div><div class="player-group"><div class="jersey-badge ${type === 'reserve' ? 'reserve-badge' : ''}"></div><select class="player-select ${type}"></select></div><select class="pos-select ${type}"></select>`;
        const pSelect = row.querySelector('.player-select'), badge = row.querySelector('.jersey-badge'), posSelect = row.querySelector('.pos-select');
        if (type === 'pitcher') { posSelect.innerHTML = '<option value="P(1)">P(1)</option>'; posSelect.disabled = true; } 
        else if (type === 'reserve') { row.removeChild(posSelect); }
        pSelect.onchange = () => {
            const p = playersData.find(x => x.name === pSelect.value);
            if (p && p.num) { badge.textContent = p.num; badge.classList.add('active'); badge.style.opacity = 1; } 
            else { badge.style.opacity = 0; }
            validate();
        };
        if (type !== 'reserve') { posSelect.onchange = updatePosDropdowns; }
        container.appendChild(row);
    }

    function validate() {
        const allP = document.querySelectorAll('.player-select'), startPos = document.querySelectorAll('.pos-select.starter, .pos-select.pitcher'), status = document.getElementById('status-box'), btnGroup = document.getElementById('action-buttons');
        const missingPos = posList.filter(p => !Array.from(startPos).some(s => s.value === p));
        const starterCount = Array.from(allP).slice(0, 10).filter(s => s.value).length;
        if (starterCount < 10) {
            status.textContent = "⌛ 請選滿先發 10 人 (含 P)，目前: " + starterCount + "/10";
            status.className = "status-message status-warning"; btnGroup.style.display = "none";
        } else if (missingPos.length > 0) {
            status.textContent = "⌛ 請填滿守備位置，缺: " + (missingPos.join(", "));
            status.className = "status-message status-warning"; btnGroup.style.display = "none";
        } else {
            status.textContent = "✅ 名單排定完成！";
            status.className = "status-message status-success"; btnGroup.style.display = "flex";
        }
    }

    async function handleShare() {
        const status = document.getElementById('status-box'); status.style.display = 'none';
        const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 2, useCORS: true, allowTaint: false });
        status.style.display = 'block';
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'lineup.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) navigator.share({ files: [file] });
            else { const link = document.createElement('a'); link.download = 'lineup.png'; link.href = URL.createObjectURL(blob); link.click(); }
        });
    }

    function init() {
        document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
        for (let i = 1; i <= 9; i++) createRow(i + ' 棒', 'starter', document.getElementById('starters-board'));
        createRow('P', 'pitcher', document.getElementById('starters-board'));
        for (let i = 1; i <= 8; i++) createRow('預', 'reserve', document.getElementById('reserves-board'));
        fetchRoster();
    }
    document.getElementById('export-btn').onclick = handleShare;
    document.getElementById('share-line-btn').onclick = handleShare;
    init();
</script>
</body>
</html>
